.ds-derived .none{color:var(--text-4);font-style:italic}
/* outreach deals col */
.c-deals{font-size:12px;color:var(--text-3);white-space:nowrap}
.ot-grid{grid-template-columns:minmax(165px,1.3fr) minmax(145px,1.4fr) 134px 104px 112px 64px minmax(145px,1.1fr) 68px}
@media(max-width:820px){ .ot-row.ot-grid .c-deals{display:none} }
/* v9.2 radar polish */
.rd-tools .select{width:auto;flex:none}
.rd-round{min-width:0;overflow:hidden;text-overflow:ellipsis}
/* v9.3 meetings table */
.mt-grid{display:grid;grid-template-columns:86px minmax(140px,1fr) minmax(150px,1.2fr) minmax(150px,1.2fr) minmax(180px,1.6fr) 96px;gap:0 12px;align-items:center}
.mt-deals{font-size:12px;color:var(--text-2);line-height:1.45;min-width:0}
.mt-deals .r2{color:var(--text-4);font-size:11px}
.mt-sum{font-size:12.5px;color:var(--text-2);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
@media(max-width:900px){ .mt-grid{grid-template-columns:76px minmax(120px,1fr) minmax(150px,1.5fr) 88px} .mt-grid .mt-deals+.mt-deals, .mt-grid .mt-sum{display:none} }
/* v9.2 reads (deep briefings) */
.reads{display:flex;flex-direction:column;height:100%;min-height:0}
.rds-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:14px}
.rds-card{padding:16px 18px;cursor:pointer;min-width:0;position:relative;transition:box-shadow 160ms var(--ease-out),transform 160ms var(--ease-out)}
@media(hover:hover){.rds-card:hover{box-shadow:inset 0 1px 0 var(--hl-soft),var(--shadow-card-hover);transform:translateY(-1px)}}
.rds-card:active{transform:scale(.99)}
.rds-card .rc-top{display:flex;align-items:center;gap:7px}
.rds-card .rc-dot{width:7px;height:7px;border-radius:999px;background:var(--accent);flex:none;box-shadow:0 0 0 3px var(--accent-bg)}
.rds-card.is-read .rc-dot{background:var(--text-4);opacity:.4;box-shadow:none}
.rds-card h3{font-family:var(--font-serif);font-size:16px;font-weight:600;letter-spacing:-.012em;color:var(--text-1);flex:1;min-width:0;line-height:1.3}
.rds-card .rc-date{font-size:11px;color:var(--text-4);white-space:nowrap}
.rds-card .rc-body{margin-top:7px;font-size:12.5px;line-height:1.55;color:var(--text-3);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.rds-card .rc-meta{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center}
.rc-kind{display:inline-flex;padding:1px 8px;border-radius:999px;font-size:10.5px;font-weight:650;letter-spacing:.03em;text-transform:uppercase}
.rc-kind.briefing{background:var(--jl-navy-bg);color:var(--jl-navy-text)}
.rc-kind.deepdive{background:var(--jl-plum-bg);color:var(--jl-plum-text)}
.rc-kind.friday{background:var(--jl-brass-bg);color:var(--jl-brass-text)}
.rds-card .rc-pin{position:absolute;top:10px;right:10px;color:var(--accent-text);opacity:0;transition:opacity var(--dur-fast)}
.rds-card.pinned .rc-pin{opacity:1}
/* reading modal — editorial: serif body with a drop cap on the opening paragraph */
.read-view{font-size:15.5px;line-height:1.7;color:var(--text-1);font-family:var(--font-serif)}
.read-view>p:first-of-type::first-letter{font-size:44px;line-height:.82;font-weight:600;float:left;padding:5px 7px 0 0;color:var(--accent-text)}
.read-view h2{font-size:19px;font-weight:650;margin:22px 0 8px;font-family:var(--font-ui);letter-spacing:-.01em}
.read-view h3{font-size:16px;font-weight:650;margin:18px 0 6px;font-family:var(--font-ui)}
.read-view h4{font-size:14px;font-weight:650;margin:14px 0 5px;font-family:var(--font-ui)}
.read-view p{margin:0 0 11px}
.read-view ul,.read-view ol{margin:0 0 11px;padding-left:24px}
.read-view li{margin:4px 0}
.read-view a{color:var(--accent-text);text-decoration:underline;text-underline-offset:2px}
.read-view hr{border:0;border-top:1px solid var(--border-hairline);margin:18px 0}
.read-view b{font-weight:650}
.modal.read-modal{max-width:760px}
.read-modal .modal-body{padding-top:4px}

/* ===================== v10 ATELIER — materials · motion · craft ===================== */
/* — iOS large-title condensation (Week): pure CSS scroll-driven, Chrome enhancement — */
@supports (animation-timeline: scroll()) {
  .week-head .vh-title{transform-origin:left bottom;animation:wk-title-condense linear both;animation-timeline:scroll(nearest);animation-range:0px 120px}
  .week-head{animation:wk-head-condense linear both;animation-timeline:scroll(nearest);animation-range:0px 120px}
  @keyframes wk-title-condense{to{transform:scale(.72)}}
  @keyframes wk-head-condense{to{padding-top:10px;box-shadow:0 1px 0 var(--border-hairline),0 6px 18px -8px rgba(43,38,30,.08)}}
}
/* — mobile sheet grabber — */
@media(max-width:767px){
  .modal::before{content:"";display:block;width:36px;height:5px;border-radius:999px;background:var(--border-strong);opacity:.55;margin:8px auto 0}
}
/* — collapsed rail: indicator pill only, no edge bar — */
#sidebar[data-collapsed] .sb-ind::before{display:none}
/* — embedded inputs inside composite fields never carry their own ring (the container does) — */
.pal-head input:focus,.pal-head input:focus-visible,.as-input:focus,.as-input:focus-visible,
.cmp-box input:focus,.cmp-box input:focus-visible,.ai-row input:focus,.ai-row input:focus-visible{box-shadow:none}
/* — icon buttons: soft press ring — */
.icon-btn:active:not(:disabled){transform:scale(.9)}
/* — week arrows + kpi ring polish — */
.wk-arrow{transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out),transform var(--dur-fast) var(--ease-out)}
.kpi-ring .fill{filter:drop-shadow(0 0 2.5px color-mix(in srgb,var(--accent) 45%,transparent))}
/* — assistant starters: glass chips — */
.as-starter{background:var(--glass-panel);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
/* — quiet scroll fades on tab strips — */
.or-tabs{scrollbar-width:none}
.or-tabs::-webkit-scrollbar{display:none}
/* — day labels: bronze tick — */
.day-label{position:relative}
.day-label::before{content:"";width:3px;height:3px;border-radius:999px;background:var(--accent);opacity:.55;margin-right:1px;align-self:center}
/* — meeting kind chip + status chips: inner ring for depth — */
.os-chip{box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--os) 18%,transparent)}
.chip-status{box-shadow:inset 0 0 0 1px var(--st-ring,color-mix(in srgb,var(--st) 16%,transparent))}
/* — editor floating toolbar: frosted ink — */
.float-tb{background:color-mix(in srgb,var(--ink) 94%,transparent);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-radius:11px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),var(--shadow-md)}
/* — notes pane rows: springier active spine — */
.pg-row.active::before{transition:transform 200ms var(--ease-spring)}
/* — table sort affordance — */
button.ot-hc:hover .ot-sort,button.rd-hc:hover{color:var(--accent-text)}
/* — selection colour on serif reading surfaces — */
.read-view::selection,.read-view *::selection,.th-read::selection,.th-read *::selection{background:color-mix(in srgb,var(--accent) 22%,transparent)}
/* — dark mode: lanes + facts keep their lift — */
[data-theme=dark] .lane{box-shadow:inset 0 1px 0 rgba(255,252,244,.04),0 1px 2px rgba(0,0,0,.2)}
[data-theme=dark] .ds-facts{box-shadow:inset 0 0 0 1px var(--border-hairline),inset 0 1px 0 rgba(255,252,244,.03)}
/* — reduced motion: kill v10 entrances explicitly (belt over the global brace) — */
@media(prefers-reduced-motion:reduce){
  #view.view-enter .lane,#view.view-enter .ct-row,#view.view-enter .ot-row,#view.view-enter .rd-row,
  #view.view-enter .co-card,#view.view-enter .th-card,#view.view-enter .rds-card,#view.view-enter .tr-card,
  #view.view-enter .set-card,#view.view-enter .rd-kpis,#view.view-enter .or-kpis,#view.view-enter .msg{animation:none !important}
  .seg-thumb,.sb-ind{transition:none !important}
}
</style>
</head>

/* ---- v9.2 mdLite: markdown-ish plain text → editor-safe html (headings, bullets, bold, links) ---- */
function mdLiteCore(src){
var out=[], para=[], list=[];
function inline(s){
s=esc(s);
s=s.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<i>$2</i>");
s=s.replace(/(https?:\/\/[^\s<>()]+[^\s<>().,;:!?'"])/g,'<a href="$1">$1</a>');
return s;
}
function flushP(){ if(para.length){ out.push("<p>"+para.map(inline).join("<br>")+"</p>"); para=[]; } }
function flushL(){ if(list.length){ out.push("<ul>"+list.map(function(x){ return "<li>"+inline(x)+"</li>"; }).join("")+"</ul>"); list=[]; } }
String(src||"").replace(/\r\n?/g,"\n").split("\n").forEach(function(ln){
var hm=/^\s*(#{1,4})\s+(.*)$/.exec(ln);
if(hm){ flushP(); flushL(); var lvl=Math.max(2,Math.min(4,hm[1].length+1)); out.push("<h"+lvl+">"+inline(hm[2])+"</h"+lvl+">"); return; }

if(/^\s*(-{3,}|—{3,})\s*$/.test(ln)){ flushP(); flushL(); out.push("<hr>"); return; }
if(!ln.trim()){ flushP(); flushL(); return; }
flushL(); para.push(ln);
});
flushP(); flushL();
return out.join("");
}

<script>
(function(){

function strip(html){ return String(html||"").replace(/<[^>]*>/g," ").replace(/&[a-z#0-9]+;/gi," ").replace(/\s+/g," ").trim(); }
/* fuzzy subsequence score: consecutive + word-start bonuses; -1 = no match */
function fuzzy(q,s){
q=q.toLowerCase(); s=String(s||"").toLowerCase();
if(!q) return 0;
var qi=0,score=0,streak=0;
for(var i=0;i<s.length && qi<q.length;i++){
if(s[i]===q[qi]){ streak++; score+=1+streak*2+((i===0||/[\s\-_/]/.test(s[i-1]))?6:0); qi++; }
else streak=0;
}
if(qi<q.length) return -1;
return score-Math.floor(s.length/8);
}

function searchItems(q){

st.notes.pages.filter(function(p){return !p.deleted;}).forEach(function(p){

});
st.tracker.tasks.filter(function(t){return !t.deleted;}).forEach(function(t){
var sc=Math.max(fuzzy(q,t.task),fuzzy(q,t.company||"")-2);
if(sc<0) return;
items.push({group:"Tasks",label:t.task,sub:(t.company&&t.company!=="General"?t.company+" · ":"")+t.status+" · "+C.fmtWeek(t.week),ic:"board",score:sc,id:"t:"+t.id,run:function(){
ui.week=t.week; W.shell.nav("week"); W.render(); if(W.views.week.openTask) W.views.week.openTask(t.id);
}});
});
st.outreach.contacts.filter(function(c){return !c.deleted;}).forEach(function(c){
var sc=Math.max(fuzzy(q,c.name),fuzzy(q,c.firm||"")-2);
if(sc<0) return;
items.push({group:"Contacts",label:c.name,sub:[c.firm,c.title].filter(Boolean).join(" · "),ic:"users",score:sc,id:"c:"+c.id,run:function(){
W.shell.nav("outreach"); if(W.views.outreach.reveal) W.views.outreach.reveal(c.id);
}});
});
((st.radar||{}).deals||[]).filter(function(d){return !d.deleted;}).forEach(function(d){
var sc=Math.max(fuzzy(q,d.company),fuzzy(q,d.investors||"")-2);
if(sc<0) return;
items.push({group:"Deals",label:d.company,sub:[d.sector,d.round,d.amount].filter(Boolean).join(" · "),ic:"radar",score:sc,id:"d:"+d.id,run:function(){
W.shell.nav("radar"); if(W.views.radar&&W.views.radar.reveal) W.views.radar.reveal(d.id);
}});
});
(((st.reads||{}).items)||[]).filter(function(r){return !r.deleted;}).forEach(function(r){
var sc=Math.max(fuzzy(q,r.title),fuzzy(q,(r.tags||[]).join(" "))-2);
if(sc<0) return;
items.push({group:"Reads",label:r.title,sub:(r.date||"")+(r.readAt?"":" · unread"),ic:"book",score:sc,id:"r:"+r.id,run:function(){
W.shell.nav("reads"); if(W.views.reads&&W.views.reads.reveal) W.views.reads.reveal(r.id);
}});
});
(((st.outreach||{}).meetings)||[]).filter(function(m){return !m.deleted;}).forEach(function(m){
var sc=Math.max(fuzzy(q,m.name),fuzzy(q,m.firm||"")-2,fuzzy(q,(m.summary||"").slice(0,80))-4);
if(sc<0) return;
items.push({group:"Meetings",label:m.name+(m.firm?" · "+m.firm:""),sub:(m.kind||"Call")+" · "+(m.date||""),ic:"calendar",score:sc,id:"m:"+m.id,run:function(){
W.shell.nav("outreach"); if(W.views.outreach.revealMeetings) W.views.outreach.revealMeetings();
}});
});
items.sort(function(a,b){ return b.score-a.score; });
var byGroup={Notes:0,Tasks:0,Contacts:0,Deals:0,Reads:0,Meetings:0};
return items.filter(function(it){ byGroup[it.group]++; return byGroup[it.group]<=5; });

function openPalette(){
if(open){ return; }
open=true;
var sel=0, flat=[];
var input=h("input",{type:"text",placeholder:"Search or run a command…","aria-label":"Command palette",autofocus:true});
var list=h("div.pal-list",{role:"listbox"});
var back=h("div.backdrop");
var wrap=h("div.pal-wrap");
var pal=h("div.palette",{role:"dialog","aria-modal":"true","aria-label":"Command palette"},
h("div.pal-head",icon("search",17),input,h("kbd","esc")),
list,
h("div.pal-foot",h("span",h("kbd","↑"),h("kbd","↓")," navigate"),h("span",h("kbd","↵")," select"),h("span",h("kbd","esc")," close")));
wrap.appendChild(pal);
document.body.appendChild(back); document.body.appendChild(wrap);
var layer=W.layers.push({type:"palette",el:pal,close:close});
wrap.addEventListener("pointerdown",function(e){ if(e.target===wrap) close(); });
function close(){
if(!open) return; open=false; W.layers.remove(layer);

setTimeout(function(){ wrap.remove(); back.remove(); },110);
}
closeFn=close;
function draw(){
var q=input.value.trim();
flat=[];
list.innerHTML="";
var groups={},order=[];
var pool;
if(!q){ pool=baseItems(); pool.sort(function(a,b){ var ra=recent.indexOf(a.id),rb=recent.indexOf(b.id); if(ra<0)ra=999; if(rb<0)rb=999; return ra-rb; }); }
else{
pool=baseItems().map(function(it){ it.score=fuzzy(q,it.label); return it; }).filter(function(it){ return it.score>=0; });
pool=pool.concat(searchItems(q));
pool.sort(function(a,b){ return (b.score||0)-(a.score||0); });
}
pool.forEach(function(it){ if(!groups[it.group]){ groups[it.group]=[]; order.push(it.group); } groups[it.group].push(it); });
if(!pool.length){ list.appendChild(h("div.pal-empty","No results for “"+q+"”")); return; }
order.forEach(function(g){
list.appendChild(h("div.pal-group",g));
groups[g].forEach(function(it){
var idx=flat.length; flat.push(it);
var row=h("div.pal-item",{role:"option","aria-selected":String(idx===sel),onclick:function(){ run(it); }},
icon(it.ic||"arrow-r",16),h("span.pi-main",it.label),
it.sub?h("span.pi-sub",it.sub):null,
it.kbd?h("span.pi-kbd",it.kbd.replace("⌘","⌘+").split("+").filter(Boolean).map(function(k){return h("kbd",k);})):null);
row.addEventListener("mousemove",function(){ if(sel!==idx){ sel=idx; paint(); } });
list.appendChild(row);
});
});
paint();
}
function paint(){
$$(".pal-item",list).forEach(function(el,i){ el.setAttribute("aria-selected",String(i===sel)); });
var cur=$$(".pal-item",list)[sel];
if(cur && cur.scrollIntoView) cur.scrollIntoView({block:"nearest"});
}
function run(it){
recent=[it.id].concat(recent.filter(function(x){return x!==it.id;})).slice(0,8);
close();
setTimeout(function(){ it.run(); },0);
}
input.addEventListener("input",function(){ sel=0; draw(); });
input.addEventListener("keydown",function(e){
if(e.key==="ArrowDown"){ e.preventDefault(); if(flat.length){ sel=(sel+1)%flat.length; paint(); } }
else if(e.key==="ArrowUp"){ e.preventDefault(); if(flat.length){ sel=(sel-1+flat.length)%flat.length; paint(); } }
else if(e.key==="Enter"){ e.preventDefault(); if(flat[sel]) run(flat[sel]); }
});
draw();
input.focus();
}
W.palette={
open:openPalette,
toggle:function(){ if(open) closeFn(); else openPalette(); },
get isOpen(){ return open; }
};
})();
</script>

function weekTasks(){ return ENG.state.tracker.tasks.filter(function(t){ return t.week===ui.week && !t.deleted; }); }
function orderOf(t){ return typeof t.order==="number"?t.order:900; }

return weekTasks().filter(function(t){ return (t.lane||"monitoring")===lane; })
.sort(function(a,b){ return orderOf(a)-orderOf(b) || (a.updated||0)-(b.updated||0); });
}

var g={}; C.DAYS.forEach(function(d){ g[d.key]=[]; }); g._any=[];

Object.keys(g).forEach(function(k){ g[k].sort(function(a,b){ return (a.status==="Done"?1:0)-(b.status==="Done"?1:0) || orderOf(a)-orderOf(b); }); });

}
function maxOrder(lane){

/* quick-add day-word parser: mon/tue/wed/thu/fri (full names too), case-insensitive */
function parseQuick(text){
var day=null;

var out=[];
var re=/^(mon(day)?|tue(s|sday)?|wed(nesday)?|thu(r|rs|rsday)?|fri(day)?)$/i;
for(var i=0;i<words.length;i++){
var m=re.exec(words[i]);
if(m && !day){ day=words[i].slice(0,3).toLowerCase(); continue; }
out.push(words[i]);
}
return {task:out.join(" ").trim(),day:day};
}

h("button.btn.btn-ghost",{type:"button",onclick:function(){ openBrainDump(); }},icon("sparkle",16),"Brain dump"),

h("button.btn.btn-ink",{type:"button",dataset:{act:"new"},onclick:function(){ openTaskModal(null,{}); }},icon("plus",15),"New task"))),

/* ---- drag & drop: pointer events; mouse = 5px threshold, touch = 300ms long-press.
   Drop settles via FLIP: the lifted card's fixed-position rect is captured as its
   before-rect, so it springs from under the pointer into its new slot. ---- */
var drag=null;
function bindDnD(lanesEl){
lanesEl.addEventListener("pointerdown",function(e){
if(e.button!==undefined && e.button!==0) return;
var cardEl=e.target.closest?e.target.closest(".task-card"):null;
if(!cardEl || !lanesEl.contains(cardEl)) return;
if(e.target.closest(".t-check,.t-actions,button,input,textarea,select,a")) return;
drag={el:cardEl,id:cardEl.dataset.id,sx:e.clientX,sy:e.clientY,active:false,longT:null,lanesEl:lanesEl};
if(e.pointerType==="touch"){ drag.longT=setTimeout(function(){ if(drag&&!drag.active) lift(drag.sx,drag.sy); },300); }
document.addEventListener("pointermove",onMove);
document.addEventListener("pointerup",onUp);
document.addEventListener("pointercancel",onCancel);
document.addEventListener("keydown",onKey,true);
});
}
function lift(x,y){
if(!drag||drag.active) return;
var el=drag.el, r=el.getBoundingClientRect();
drag.active=true; drag.rect=r;
drag.ph=W.h("div.drop-ph",{style:"height:"+r.height+"px"});
el.parentNode.insertBefore(drag.ph,el.nextSibling);
el.classList.add("dragging");
el.style.width=r.width+"px"; el.style.left=r.left+"px"; el.style.top=r.top+"px";
drag.dx=x-r.left; drag.dy=y-r.top;
var view=W.$("#view"); if(view) view.classList.add("board-dragging");
markPH();
}
function markPH(){
W.$$(".lane-body",drag.lanesEl).forEach(function(b){ b.classList.toggle("has-ph",b.contains(drag.ph)); });
}
function onMove(e){
if(!drag) return;
var dist=Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy);
if(!drag.active){
if(drag.longT && dist>8){ release(); return; }
if(!drag.longT && dist>5) lift(e.clientX,e.clientY);
if(!drag.active) return;
}
e.preventDefault();
drag.el.style.left=(e.clientX-drag.dx)+"px";
drag.el.style.top=(e.clientY-drag.dy)+"px";
placePH(e.clientX,e.clientY);
}
function placePH(x,y){
var under=document.elementFromPoint(x,y);
var lane=under && under.closest?under.closest(".lane"):null;
W.$$(".lane",drag.lanesEl).forEach(function(l){ l.classList.toggle("dragover",l===lane); });
if(!lane) return;
var body=W.$(".lane-body",lane);
var cards=W.$$(".task-card:not(.dragging)",body);
var placed=false;
for(var i=0;i<cards.length;i++){
var r=cards[i].getBoundingClientRect();
if(y<r.top+r.height/2){ cards[i].parentNode.insertBefore(drag.ph,cards[i]); placed=true; break; }
}
if(!placed){
var groups=W.$$(".day-group",body);
if(groups.length) groups[groups.length-1].appendChild(drag.ph);
else body.insertBefore(drag.ph,W.$(".drop-hint",body));
}
markPH();
}
function onKey(e){ if(e.key==="Escape" && drag && drag.active){ e.preventDefault(); e.stopPropagation(); onCancel(); } }
function release(){
if(!drag) return;
clearTimeout(drag.longT);
document.removeEventListener("pointermove",onMove);
document.removeEventListener("pointerup",onUp);
document.removeEventListener("pointercancel",onCancel);
document.removeEventListener("keydown",onKey,true);
var view=W.$("#view"); if(view) view.classList.remove("board-dragging");
W.$$(".lane.dragover").forEach(function(l){ l.classList.remove("dragover"); });
var wasActive=drag.active; drag=null;
return wasActive;
}
function onUp(){
if(!drag) return;
if(!drag.active){ release(); return; }
var ph=drag.ph, id=drag.id;
var laneEl=ph.closest(".lane");
var grp=ph.closest(".day-group");
var lane=laneEl?laneEl.dataset.lane:null;
var day=grp?(grp.dataset.day||null):null;
var t=ENG.state.tracker.tasks.filter(function(x){return x.id===id;})[0];
if(lane && t){
var seq=[];
W.$$(".task-card:not(.dragging), .drop-ph",W.$(".lane-body",laneEl)).forEach(function(n){
seq.push(n.classList.contains("drop-ph")?id:n.dataset.id);
});
t.lane=lane; t.day=day; ENG.touch(t);
seq.forEach(function(tid,i){
var x=ENG.state.tracker.tasks.filter(function(q){return q.id===tid;})[0];
if(x && orderOf(x)!==(i+1)*10){ x.order=(i+1)*10; ENG.touch(x); }
});
release();
ENG.save(false);
rr(true);
return;
}
onCancel();
}
function onCancel(){
if(!drag) return;
var wasActive=release();
if(wasActive) rr(true); /* springs back to its origin slot */
}

/* ---- brain dump modal: AI sort via parseModel, heuristic fallback ---- */
function guessLane(line){
var s=line.toLowerCase();
var comp=null;
C.COMPANIES.forEach(function(c){ if(!comp && c!=="General" && s.indexOf(c.toLowerCase())>=0) comp=c; });
if(comp) return {lane:"monitoring",company:comp};
if(/\b(intro|network|networking|coffee|event|meet ?up|linkedin|connect|catch ?up)\b/.test(s)) return {lane:"other",company:null};
if(/\b(help|support|review|feedback|assist|cover)\b/.test(s)) return {lane:"support",company:null};
return {lane:"initiatives",company:null};
}
function heuristicParse(text){
return String(text).split(/\n+/).map(function(l){ return l.replace(/^[\s•\-*\d.)\]]+/,"").trim(); })
.filter(Boolean).map(function(l){
var q=parseQuick(l), g=guessLane(q.task);
return {task:q.task,lane:g.lane,day:q.day,company:g.company};
}).filter(function(it){ return it.task; });
}
function sanitizeItems(arr){
var lanes=["monitoring","initiatives","support","other"];
var out=[];
(Array.isArray(arr)?arr:[]).forEach(function(o){
if(!o) return;
var task=String(o.task||o.title||"").trim(); if(!task) return;
var lane=lanes.indexOf(o.lane)>=0?o.lane:guessLane(task).lane;
var day=null;
if(o.day){ var dk=String(o.day).slice(0,3).toLowerCase(); if(["mon","tue","wed","thu","fri"].indexOf(dk)>=0) day=dk; }
var company=null;
if(o.company){ C.COMPANIES.forEach(function(c){ if(!company && c.toLowerCase()===String(o.company).toLowerCase()) company=c; }); }
out.push({task:task,lane:lane,day:day,company:company});
});
return out;
}
function bdSystemPrompt(){

}

var sortBtn=h("button.btn.btn-secondary.sparkle-btn",{type:"button"},icon("sparkle",15),ENG.haveAI()?"Sort with AI":"Sort lines");
function drawPreview(){
preview.innerHTML="";
items.forEach(function(it){

it.company?h("span.chip.chip-tag",it.company):null,

sortBtn.addEventListener("click",function(){

sortBtn.disabled=true; sortBtn.classList.add("busy");

.then(function(){ sortBtn.disabled=false; sortBtn.classList.remove("busy"); lbl.textContent=ENG.haveAI()?"Sort with AI":"Sort lines"; });

p.foot.appendChild(apply);
},{wide:true});

function currentFontPx(){
try{
var s=window.getSelection();
var n=s&&s.anchorNode?s.anchorNode:null;
if(n&&n.nodeType===3) n=n.parentNode;
while(n&&n!==bodyEl&&n.nodeType===1){
if(n.style&&n.style.fontSize){ var m=/^([\d.]+)px$/.exec(n.style.fontSize); if(m) return Math.round(+m[1]); }
n=n.parentNode;
}
var b=currentBlock();
if(b&&b!==bodyEl){
var tg=b.tagName.toLowerCase();
if(tg==="h1") return 25;
if(tg==="h2") return 20;
if(tg==="h3") return 17;

/* token helpers: read/consume text immediately before the caret */
function tokenBefore(re){
try{
var s=window.getSelection();
if(!s||!s.rangeCount||!s.isCollapsed) return null;
var node=s.anchorNode;
if(!node||node.nodeType!==3||!bodyEl||!bodyEl.contains(node)) return null;
var before=node.textContent.slice(0,s.anchorOffset);
var m=re.exec(before);
return m?{m:m,node:node,off:s.anchorOffset}:null;
}catch(e){ return null; }
}
function eatToken(re){
try{
var s=window.getSelection();
if(!s||!s.rangeCount) return;
var node=s.anchorNode, off=s.anchorOffset;
if(!node||node.nodeType!==3) return;
var before=node.textContent.slice(0,off);
var m=re.exec(before);
if(!m) return;
var r=document.createRange();
r.setStart(node,off-m[0].length); r.setEnd(node,off);
r.deleteContents();
}catch(e){}
}
function insertNodeAtCaret(el,trailingSpace){
try{
var s=window.getSelection();
if(!s||!s.rangeCount){ bodyEl.appendChild(el); return; }
var r=s.getRangeAt(0);
r.insertNode(el);
var after=el;
if(trailingSpace){
var sp=document.createTextNode(" ");
if(el.parentNode) el.parentNode.insertBefore(sp,el.nextSibling);
after=sp;
}
var r2=document.createRange();
r2.setStartAfter(after); r2.collapse(true);
s.removeAllRanges(); s.addRange(r2);
}catch(e){ try{ bodyEl.appendChild(el); }catch(e2){} }
}

/* ---------- htmlToMd ---------- */
function htmlToMd(html){
var d=document.createElement("div");
d.innerHTML=String(html||"");
var md=blockMd(d,"");
return md.replace(/​/g,"").replace(/\n{3,}/g,"\n\n").trim();
}
function inlineMd(node){
var out="";
Array.prototype.slice.call(node.childNodes).forEach(function(n){
if(n.nodeType===3){ out+=n.textContent; return; }
if(n.nodeType!==1) return;
var tag=n.tagName.toLowerCase();
if(tag==="br"){ out+="\n"; return; }
if(tag==="b"||tag==="strong"){ out+="**"+inlineMd(n)+"**"; return; }
if(tag==="i"||tag==="em"){ out+="*"+inlineMd(n)+"*"; return; }
if(tag==="s"||tag==="strike"||tag==="del"){ out+="~~"+inlineMd(n)+"~~"; return; }
if(tag==="code"){ out+="`"+n.textContent+"`"; return; }
if(tag==="img"){ out+="![image]"; return; }
if(tag==="a"){
var txt=inlineMd(n);
if(n.classList.contains("plink")){ out+="[["+txt+"]]"; return; }
out+="["+txt+"]("+(n.getAttribute("href")||"")+")"; return;
}
out+=inlineMd(n);
});
return out;
}
function blockMd(node,indent){
var out="";
Array.prototype.slice.call(node.childNodes).forEach(function(n){
if(n.nodeType===3){ var t=n.textContent.trim(); if(t) out+=t+"\n\n"; return; }
if(n.nodeType!==1) return;
var tag=n.tagName.toLowerCase(), cls=n.classList;
if(tag==="h1"){ out+="# "+inlineMd(n).trim()+"\n\n"; return; }
if(tag==="h2"){ out+="## "+inlineMd(n).trim()+"\n\n"; return; }
if(tag==="h3"||tag==="h4"){ out+="### "+inlineMd(n).trim()+"\n\n"; return; }
if(tag==="p"){ var pt=inlineMd(n).trim(); out+=(pt?pt+"\n\n":""); return; }
if(tag==="hr"){ out+="---\n\n"; return; }
if(tag==="pre"){ out+="```\n"+n.textContent.replace(/​/g,"")+"\n```\n\n"; return; }
if(tag==="blockquote"){
inlineOrBlock(n).split("\n").forEach(function(ln){ if(ln.trim()) out+="> "+ln.trim()+"\n"; });
out+="\n"; return;
}
if(tag==="ul"||tag==="ol"){ out+=listMd(n,indent)+"\n"; return; }
if(tag==="table"){ out+=tableMd(n)+"\n"; return; }
if(cls&&cls.contains("todo")){
var cb=n.querySelector("input");
var sp=n.querySelector("span");
out+="- ["+(cb&&(cb.checked||cb.hasAttribute("checked"))?"x":" ")+"] "+(sp?inlineMd(sp).trim():"")+"\n"; return;
}
if(cls&&cls.contains("on-callout")){
var parts=[];
$$(":scope>span",n).forEach(function(spn){ if(!spn.classList.contains("ci")) parts.push(inlineMd(spn).trim()); });
out+="> "+(parts.join(" ")||inlineMd(n).trim())+"\n\n"; return;
}
if(cls&&cls.contains("toggle")){
var hd=n.querySelector(".tg-hd"), bd=n.querySelector(".tg-bd");
out+="**"+(hd?inlineMd(hd).replace(/[▶▸]/g,"").trim():"Toggle")+"**\n\n";
if(bd) out+=blockMd(bd,indent);
return;
}
if(cls&&cls.contains("on-imgwrap")){ out+="![image]\n\n"; return; }
if(tag==="div"||tag==="section"||tag==="article"){
var inner=blockMd(n,indent);
if(inner.trim()) out+=inner;
else{ var it=inlineMd(n).trim(); if(it) out+=it+"\n\n"; }
return;
}
var fb=inlineMd(n).trim();
if(fb) out+=fb+"\n\n";
});
return out;
}
function inlineOrBlock(n){
var hasBlock=n.querySelector&&n.querySelector("p,div,ul,ol,h1,h2,h3");
return hasBlock?blockMd(n,"").trim():inlineMd(n).trim();
}
function listMd(list,indent){
var out="", i=1, ordered=list.tagName.toLowerCase()==="ol";
Array.prototype.slice.call(list.children).forEach(function(li){
if(li.tagName.toLowerCase()!=="li") return;
var own="";
Array.prototype.slice.call(li.childNodes).forEach(function(kid){
if(kid.nodeType===1&&/^(ul|ol)$/i.test(kid.tagName)) return;
own+=kid.nodeType===3?kid.textContent:inlineMd(kid);
});
out+=indent+(ordered?(i+". "):"- ")+own.trim()+"\n";
i++;
Array.prototype.slice.call(li.children).forEach(function(kid){
if(/^(ul|ol)$/i.test(kid.tagName)) out+=listMd(kid,indent+"  ");
});
});
return out;
}
function tableMd(tbl){
var out="";
var rows=Array.prototype.slice.call(tbl.querySelectorAll("tr"));
rows.forEach(function(tr,ri){
var cells=Array.prototype.slice.call(tr.children).map(function(c){ return inlineMd(c).replace(/\n/g," ").replace(/\|/g,"\\|").trim(); });
out+="| "+cells.join(" | ")+" |\n";
if(ri===0) out+="|"+cells.map(function(){ return " --- |"; }).join("")+"\n";
});
return out;
}

function blContext(q,p){

el.appendChild(h("mark",text.slice(i,i+t.length)));
el.appendChild(document.createTextNode(text.slice(i+t.length,b)+(b<text.length?"…":"")));
return el;
}

function stripFences(s){
s=String(s||"").trim();

}
function mdLite(t){

out=out.replace(/\*\*([^*\n]+)\*\*/g,"<b>$1</b>").replace(/`([^`\n]+)`/g,"<code>$1</code>");

lines.forEach(function(ln){

html+="<li>"+ln.replace(/^\s*[-•]\s+/,"")+"</li>";
}else{
if(inList){ html+="</ul>"; inList=false; }
if(ln.trim()) html+="<p>"+ln+"</p>";
}
});
if(inList) html+="</ul>";

}

var MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function relTime(ts){
if(!ts) return "—";
var s=Math.floor((C.now()-ts)/1000);
if(s<45) return "just now";
if(s<3600) return Math.max(1,Math.floor(s/60))+"m ago";
if(s<86400) return Math.floor(s/3600)+"h ago";
if(s<7*86400) return Math.floor(s/86400)+"d ago";
var d=new Date(ts), nw=new Date();
return d.getDate()+" "+MO[d.getMonth()]+(d.getFullYear()!==nw.getFullYear()?" "+d.getFullYear():"");
}
function copyText(txt){

/* ---- date-string helpers (ISO yyyy-mm-dd → relative / absolute) ---- */
function todayISO(){ return C.localISO(new Date()); }
function relDay(iso){
if(!iso) return "—";
try{
var d=C.parseLocal(iso), t=C.parseLocal(todayISO());
var diff=Math.round((t.getTime()-d.getTime())/86400000);
if(diff===0) return "Today";
if(diff===1) return "Yesterday";
if(diff>1 && diff<7) return diff+"d ago";
if(diff>=7 && diff<62) return Math.floor(diff/7)+"w ago";
if(diff<0){ var f=-diff; if(f===1) return "Tomorrow"; if(f<7) return "in "+f+"d"; if(f<62) return "in "+Math.ceil(f/7)+"w"; }
return d.getDate()+" "+MO[d.getMonth()]+(d.getFullYear()!==t.getFullYear()?" "+d.getFullYear():"");
}catch(e){ return iso; }
}

"New":"var(--text-4)","Outreach Sent":"var(--info)","Responded":"var(--purple)",
"Meeting Booked":"var(--ok)","Intro Made":"color-mix(in srgb, var(--ok) 55%, var(--ink) 45%)",
"Follow-up Needed":"var(--warn)","Closed":"var(--text-3)"
};
function initials(name){
var p=String(name||"").trim().split(/\s+/);
return ((p[0]||"")[0]||"?").toUpperCase()+((p[1]||"")[0]||"").toUpperCase();
}
/* v6: avatar identity = company-or-name jewel hue (shared W.ui.hue hash; chip-bg fill, ink text, .25 ring) */
function avatar(c,sm){
var comp=(c.companyIds||[]).map(companyById).filter(Boolean)[0];
var k=W.ui.hue((comp&&comp.name)||c.name);
return h("span.ct-av",{class:sm?"sm":null,style:"--av:var(--jl-"+k+");--av-fill:var(--jl-"+k+"-bg);--av-on:var(--jl-"+k+"-text)","aria-hidden":"true"},initials(c.name));
}
function osChip(s){
return h("span.os-chip",{style:"--os:"+(OS_TOK[s]||"var(--text-4)")},h("span.dot"),s||"New");
}

/* ---- data ---- */
function contacts(){ return ENG.state.outreach.contacts.filter(function(c){ return !c.deleted; }); }
function companies(){ return ENG.state.outreach.companies.filter(function(c){ return !c.deleted; }); }
function dealLines(v){ return String(v||"").split(/\n|;/).map(function(x){ return x.trim(); }).filter(Boolean); }
/* v9.4 — meetings are the source of truth; contact-level deals are DERIVED (legacy text still counted) */
function meetingsFor(c){
return meetings().filter(function(m){ return m.contactId===c.id || (m.name||"").toLowerCase()===(c.name||"").toLowerCase(); })
.sort(function(a,b){ return String(b.date||"").localeCompare(String(a.date||"")); });
}
function dealsForContact(c){
var out=dealLines(c.dealsShared), inn=dealLines(c.dealsReceived);
meetingsFor(c).forEach(function(m){ out=out.concat(mLines(m.dealsShared)); inn=inn.concat(mLines(m.dealsReceived)); });
function uniq(a){ var seen={},r=[]; a.forEach(function(x){ var k=x.toLowerCase().replace(/\s*\(.*$/,"").trim(); if(k&&!seen[k]){ seen[k]=1; r.push(x); } }); return r; }
return {out:uniq(out),inn:uniq(inn)};
}
function summaryForContact(c){
if((c.summary||"").trim()) return c.summary.trim();
var ms=meetingsFor(c);
return ms.length?(ms[0].summary||""):"";
}
/* ---- v9: one-click Excel export ---- */
function exportExcel(){
var rows=[["Name","Email","Last contact","VC / Firm","Title","Status","Region","Type","Summary","Deals I shared","Deals they shared","Next contact","Next contact date","Companies","LinkedIn","Notes"]];
contacts().slice().sort(function(a,b){ return String(a.name).localeCompare(String(b.name)); }).forEach(function(c){
var comps=(c.companyIds||[]).map(companyById).filter(Boolean).map(function(co){ return co.name; }).join(", ");
var dd=dealsForContact(c);
rows.push([c.name||"",c.email||"",c.lastContactDate||"",c.firm||"",c.title||"",c.status||"",c.region||"",c.type||"",
summaryForContact(c),dd.out.join("; "),dd.inn.join("; "),
c.nextStep||"",c.nextStepDate||"",comps,c.linkedinUrl||"",c.notes||""]);
});
var widths=[22,26,13,22,20,15,8,10,42,30,30,26,14,24,34,42];
W.xlsx.download("outreach-"+todayISO()+".xlsx","Outreach",rows,widths);
W.toast("Excel downloaded — "+(rows.length-1)+" contacts ✓");
}
function companyById(id){
var r=null;
ENG.state.outreach.companies.forEach(function(co){ if(co.id===id && !co.deleted) r=co; });
return r;
}
/* engine buckets → display buckets: quiet deduped against the other three, stable sorts */
function buckets(){
var w=C.outreachWeek(ENG.state.outreach.contacts);
var seen={};
["overdue","due","noStep"].forEach(function(k){ w[k].forEach(function(c){ seen[c.id]=1; }); });
function byField(f){ return function(a,b){ return String(a[f]||"").localeCompare(String(b[f]||"")) || String(a.name).localeCompare(String(b.name)); }; }
return {
overdue:w.overdue.slice().sort(byField("nextStepDate")),
due:w.due.slice().sort(byField("nextStepDate")),
noStep:w.noStep.slice().sort(function(a,b){ return String(a.name).localeCompare(String(b.name)); }),
quiet:w.quiet.filter(function(c){ return !seen[c.id]; }).sort(byField("lastContactDate"))
};
}

/* ---- weekly brief (exact live-app text) ---- */
function briefText(){
var b=buckets();
var out=["Outreach — week of "+C.fmtWeek(C.weekKey(new Date()))];
var any=false;
[["OVERDUE","overdue"],["DUE THIS WEEK","due"],["NO NEXT STEP","noStep"],["GOING QUIET","quiet"]].forEach(function(p){
var arr=b[p[1]]; if(!arr.length) return;
any=true;
out.push(""); out.push(p[0]);
arr.forEach(function(c){
out.push("- "+c.name+" ("+c.firm+") — "+c.status+(c.nextStep?": "+c.nextStep:"")+(c.nextStepDate?" ["+c.nextStepDate+"]":""));
});
});
if(!any){ out.push(""); out.push("All clear — nothing needs attention this week."); }
return out.join("\n");
}
function copyBrief(){
copyText(briefText());
W.toast("Weekly brief copied ✓");
}
function doCopyBrief(btn){
copyText(briefText());
if(btn.dataset.busy) return;
btn.dataset.busy="1";
var keep=[]; while(btn.firstChild){ keep.push(btn.firstChild); btn.removeChild(btn.firstChild); }
btn.appendChild(icon("check",15)); btn.appendChild(h("span","Copied ✓"));
setTimeout(function(){
btn.innerHTML="";
keep.forEach(function(k){ btn.appendChild(k); });
delete btn.dataset.busy;
},1400);
}

/* ---- LinkedIn paste parse (AI via parseModel; heuristic fallback) ---- */
function linkedinHeuristic(text){
var out={};
var lines=String(text||"").split(/\n+/).map(function(l){ return l.trim(); }).filter(Boolean);
if(lines.length) out.name=lines[0].replace(/\s*[-|·•].*$/,"").trim();
var matched=false;
for(var i=0;i<lines.length;i++){
var m=/^(.+?)\s+(?:at|@)\s+(.+)$/i.exec(lines[i]);
if(m){ out.title=m[1].trim(); out.firm=m[2].trim(); matched=true; break; }
}
if(!matched && lines[1]) out.title=lines[1];
var u=/https?:\/\/[^\s"'<>]*linkedin\.com\/[^\s"'<>),]*/i.exec(String(text||""));
if(u) out.linkedinUrl=u[0];
return out;
}

if(!arr.length) return null;
var a=arr.slice().sort(function(x,y){ return x-y; });

last90.forEach(function(d){

});

function mdLite(src){

i++; continue;

recog.onerror=function(){ try{ if(recog) recog.stop(); }catch(e){} };
btn.classList.add("rec");
try{ recog.start(); }catch(e){ recog=null; btn.classList.remove("rec"); }
});

/* ---- send / receive ---- */
function send(text){
var val=String(text!=null?text:(ta?ta.value:"")).trim();
if(!val || busy) return;
if(!ENG.haveAI()){ W.toast("Add your Anthropic API key in Settings first",true); return; }
var chat=curChat();
if(!chat){
chat={id:C.uid(),title:val.slice(0,40),messages:[],updated:C.now()};
ENG.state.ai.chats.push(chat);
chatId=chat.id;
}
chat.messages.push({role:"user",content:val});
ENG.touch(chat); ENG.save(false);
var col=$("#as-col");
if(col){
var em=col.querySelector(".as-empty"); if(em) col.innerHTML="";
col.appendChild(userMsg(val));
}
if(ta){ ta.value=""; grow(); }
pin(true);
run(chat);
}
function run(chat){
busy=true;
var col=$("#as-col");
var tyEl=h("div.msg.ai",h("span.ai-glyph",icon("sparkle",16)),h("div.as-typing",h("i"),h("i"),h("i")));
if(col){ col.appendChild(tyEl); pin(true); }
var sys=PERSONA+"\n\n"+PROTOCOL;
if(ENG.settings.useContext!==false) sys+="\n\nCurrent workspace:\n"+ENG.workspaceContext();
var msgs=chat.messages.slice(-20).map(function(m){ return {role:m.role,content:m.content}; });
ENG.callClaude(msgs,{system:sys,max_tokens:1500}).then(function(reply){
tyEl.remove();
var sp=splitActions(reply);
var applied=null;
if(sp.actions){
applied=[];
sp.actions.forEach(function(cmd){
var st=ENG.state;
var pre={t:st.tracker.tasks.length,c:st.outreach.contacts.length,p:st.notes.pages.length};
var desc=ENG.applyCommand(cmd);
var id=null, week=null;
if(desc){
var tt=String(cmd.type||"").toLowerCase();
if(tt==="task" && st.tracker.tasks.length>pre.t){ var rec=st.tracker.tasks[st.tracker.tasks.length-1]; id=rec.id; week=rec.week; }
else if(tt==="contact" && st.outreach.contacts.length>pre.c) id=st.outreach.contacts[st.outreach.contacts.length-1].id;
else if(tt==="note" && st.notes.pages.length>pre.p) id=st.notes.pages[st.notes.pages.length-1].id;
}
applied.push({cmd:cmd,desc:desc,id:id,week:week});
});
}
chat.messages.push({role:"assistant",content:reply});
ENG.touch(chat); ENG.save(false);
reveal(sp.text,applied);
}).catch(function(err){
tyEl.remove(); busy=false;
if(!col || !col.isConnected) return;
var row=h("div.as-err",icon("x",15),
h("span.em",String(err && err.message||err)),
h("button.btn.btn-ghost.btn-sm",{type:"button",onclick:function(){ row.remove(); run(chat); }},"Retry"));
col.appendChild(row); pin(true);
});
}
function reveal(text,applied){
var col=$("#as-col");
if(!col || !col.isConnected){ busy=false; return; }
var body=h("div.ai-body");
var inner=h("div.ai-wrap",body);
col.appendChild(h("div.msg.ai",h("span.ai-glyph",icon("sparkle",16)),inner));
var words=String(text||"").split(/(\s+)/);
var i=0;
function finish(){
clearTimeout(revealTimer); revealTimer=null;
body.innerHTML=mdLite(text);
if(applied && applied.length){
var av=h("div.ai-acts");
applied.forEach(function(a){ if(a.desc) av.appendChild(actCard(a)); });
if(av.children.length) inner.appendChild(av);
}
busy=false; pin();
}
function step(){
if(!body.isConnected){ clearTimeout(revealTimer); revealTimer=null; busy=false; return; }
var take=6;
while(take-- && i<words.length){ body.textContent+=words[i++]; }
pin();
if(i<words.length) revealTimer=setTimeout(step,40);
else finish();
}
if(!words.length || (W.prefersReduced && W.prefersReduced())) finish();
else step();
}

<script>
/* ===================== FREEFORM BOARD ENGINE ===================== */
/* Decoupled brainstorm-canvas engine. Registered as W.boardEngine.create(deps).
   deps: { host, getModel, save, sanitize, downscale, toast, exit }
   getModel() -> {items:[], camera:{x,y,scale}} (mutated in place & persisted by save())
   Item: {id,type:'text'|'sticky'|'shape'|'image'|'arrow', x,y,w,h,z, html?, src?, color?, shape?, x2?,y2?} */
(function(){
var W=window.__ws; if(!W) return;
var h=W.h, icon=W.icon, $=W.$, $$=W.$$;
var SURFACE_W=8000, SURFACE_H=6000;
var MINW=40, MINH=28;
var STICKIES=["#FFE38A","#FFB7A6","#B9E8C6","#B8DBFF","#E7C4F1","#FFFFFF"];
var SHAPE_COLORS=["#2B69E0","#E0662B","#1FA971","#B23BD6","#4A4A4A"];

function uid(){ try{ return (W.core&&W.core.uid)?W.core.uid():('id'+Math.random().toString(36).slice(2,10)); }catch(e){ return 'id'+Math.random().toString(36).slice(2,10); } }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

function create(deps){
  var host=deps.host, doc=host.ownerDocument;
  var model=deps.getModel();
  if(!model.camera) model.camera={x:0,y:0,scale:1};
  if(!Array.isArray(model.items)) model.items=[];

  var state={ tool:'select', sel:new Set(), drag:null, space:false, els:new Map(), undo:[], redo:[], saveT:0, guides:[] };

  /* ---- DOM scaffold ---- */
  host.classList.add('bd-wrap');
  host.innerHTML='';
  var bar=h('div.bd-toolbar');
  var viewport=h('div.bd-viewport');
  var surface=h('div.bd-surface');
  surface.style.width=SURFACE_W+'px'; surface.style.height=SURFACE_H+'px';
  var marquee=h('div.bd-marquee'); marquee.style.display='none';
  var guideLayer=h('div.bd-guides');
  surface.appendChild(guideLayer);
  surface.appendChild(marquee);
  viewport.appendChild(surface);
  host.appendChild(bar);
  host.appendChild(viewport);

  /* ---- toolbar ---- */
  function toolBtn(tool,ic,label,kbd){
    var b=h('button.bd-tool',{type:'button','data-tool':tool,'data-tip':label,'aria-label':label}); if(kbd) b.setAttribute('data-kbd',kbd);
    b.appendChild(icon(ic,17));
    b.addEventListener('mousedown',function(e){ e.preventDefault(); });
    b.addEventListener('click',function(){ setTool(tool); });
    return b;
  }
  var tools=[
    toolBtn('select','cursor','Select / move','V'),
    toolBtn('text','type','Text box','T'),
    toolBtn('sticky','sticky','Sticky note','S'),
    toolBtn('rect','square','Rectangle','R'),
    toolBtn('ellipse','circle','Ellipse','O'),
    toolBtn('arrow','arrow-ur','Arrow / connector','A'),
    toolBtn('image','image','Image')
  ];
  tools.forEach(function(t){ bar.appendChild(t); });
  bar.appendChild(h('span.bd-sep'));
  var zoomOut=h('button.bd-tool',{type:'button','data-tip':'Zoom out','aria-label':'Zoom out'},icon('minus',16));
  var zoomLbl=h('button.bd-tool.bd-zoomlbl',{type:'button','data-tip':'Reset zoom','aria-label':'Zoom level'},'100%');
  var zoomIn=h('button.bd-tool',{type:'button','data-tip':'Zoom in','aria-label':'Zoom in'},icon('plus',16));
  var fit=h('button.bd-tool',{type:'button','data-tip':'Fit to content','aria-label':'Fit'},icon('minimize',16));
  [zoomOut,zoomLbl,zoomIn,fit].forEach(function(b){ b.addEventListener('mousedown',function(e){e.preventDefault();}); bar.appendChild(b); });
  zoomOut.addEventListener('click',function(){ zoomBy(1/1.2, vpCenter()); });
  zoomIn.addEventListener('click',function(){ zoomBy(1.2, vpCenter()); });
  zoomLbl.addEventListener('click',function(){ setZoom(1, vpCenter()); });
  fit.addEventListener('click',fitContent);
  bar.appendChild(h('span.bd-spacer'));
  var exitBtn=h('button.bd-tool.bd-exit',{type:'button','data-tip':'Switch to page (document) view','aria-label':'Page view'},icon('note',15),h('span','Page view'));
  exitBtn.addEventListener('mousedown',function(e){e.preventDefault();});
  exitBtn.addEventListener('click',function(){ if(deps.exit) deps.exit(); });
  bar.appendChild(exitBtn);

  function setTool(t){ state.tool=t; $$('.bd-tool',bar).forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-tool')===t); }); viewport.setAttribute('data-tool',t); if(t==='image'){ pickImage(); setTool('select'); } }

  /* ---- camera ---- */
  function applyCam(){ var c=model.camera; surface.style.transform='translate('+c.x+'px,'+c.y+'px) scale('+c.scale+')'; zoomLbl.textContent=Math.round(c.scale*100)+'%'; }
  function vpRect(){ return viewport.getBoundingClientRect(); }
  function vpCenter(){ var r=vpRect(); return {cx:r.width/2, cy:r.height/2}; }
  function screenToSurface(clientX,clientY){ var r=vpRect(), c=model.camera; return { x:(clientX-r.left-c.x)/c.scale, y:(clientY-r.top-c.y)/c.scale }; }
  function setZoom(scale, anchor){ /* anchor:{cx,cy} in viewport px */ var c=model.camera; scale=clamp(scale,0.2,3); var r=vpRect(); var ax=anchor?anchor.cx:r.width/2, ay=anchor?anchor.cy:r.height/2; var sx=(ax-c.x)/c.scale, sy=(ay-c.y)/c.scale; c.scale=scale; c.x=ax-sx*scale; c.y=ay-sy*scale; applyCam(); saveSoon(); }
  function zoomBy(f, anchor){ setZoom(model.camera.scale*f, anchor); }
  function panBy(dx,dy){ model.camera.x+=dx; model.camera.y+=dy; applyCam(); saveSoon(); }

  /* ---- persistence + undo ---- */
  function saveSoon(){ clearTimeout(state.saveT); state.saveT=setTimeout(function(){ if(deps.save) deps.save(); },350); }

    var mod=e.metaKey||e.ctrlKey;

    if(mod&&(e.key==='d'||e.key==='D')){ if(typing) return; e.preventDefault(); e.stopPropagation(); duplicateSel(); return; }
    if((e.key==='Delete'||e.key==='Backspace')&&!typing){ if(state.sel.size){ e.preventDefault(); e.stopPropagation(); pushUndo(); [...state.sel].forEach(removeItem); saveSoon(); } return; }
    if(e.key==='Escape'){ if(state.sel.size){ e.stopPropagation(); clearSel(); } return; }
    if(!typing && /^Arrow/.test(e.key) && state.sel.size){ e.preventDefault(); e.stopPropagation(); var d=e.shiftKey?10:1; var ddx=(e.key==='ArrowLeft'?-d:e.key==='ArrowRight'?d:0), ddy=(e.key==='ArrowUp'?-d:e.key==='ArrowDown'?d:0); pushUndo(); selItems().forEach(function(m){ m.x+=ddx; m.y+=ddy; if(m.x2!=null){m.x2+=ddx;m.y2+=ddy;} var el=state.els.get(m.id); if(el){ if(m.type==='arrow') layoutArrow(el,m); else { el.style.left=m.x+'px'; el.style.top=m.y+'px'; } } }); saveSoon(); return; }
    if(!typing && !mod && !e.altKey && e.key.length===1){ var tk={v:'select',t:'text',s:'sticky',r:'rect',o:'ellipse',a:'arrow'}[e.key.toLowerCase()]; if(tk){ setTool(tk); } e.stopPropagation(); return; }
  }
  function onKeyUp(e){ if(e.key===' '){ state.space=false; viewport.classList.remove('bd-space'); } }
  doc.addEventListener('keydown',onKey,true);
  doc.addEventListener('keyup',onKeyUp,true);

  function duplicateSel(){ if(!state.sel.size) return; pushUndo(); var clones=[]; selItems().forEach(function(m){ var c=JSON.parse(JSON.stringify(m)); c.id=uid(); c.x+=16; c.y+=16; if(c.x2!=null){c.x2+=16;c.y2+=16;} c.z=topZ()+1; model.items.push(c); renderItem(c); clones.push(c.id); }); clearSel(); clones.forEach(function(id){ state.sel.add(id); var el=state.els.get(id); if(el) el.classList.add('sel'); }); saveSoon(); }

  /* ---- drag & drop image files ---- */
  viewport.addEventListener('dragover',function(e){ e.preventDefault(); });
  viewport.addEventListener('drop',function(e){ e.preventDefault(); var files=e.dataTransfer&&e.dataTransfer.files; if(!files||!files.length) return; var p=screenToSurface(e.clientX,e.clientY); [].slice.call(files).forEach(function(f,i){ if(f.type.indexOf('image')===0) fileToImageItem(f,p.x+i*20,p.y+i*20); }); });

  /* ---- paste image onto board (when not editing text) ---- */
  function onPasteBoard(e){ if(!host.isConnected) return; var ae=doc.activeElement; if(ae&&ae.closest&&ae.closest('.bd-body')) return; var cd=e.clipboardData; if(!cd) return; for(var i=0;i<(cd.items||[]).length;i++){ if(cd.items[i].kind==='file'&&cd.items[i].type.indexOf('image')===0){ e.preventDefault(); var f=cd.items[i].getAsFile(); var c=vpCenter(); var p=screenToSurface(vpRect().left+c.cx, vpRect().top+c.cy); if(f) fileToImageItem(f,p.x-140,p.y-100); return; } } }
  doc.addEventListener('paste',onPasteBoard);

  /* ---- fit ---- */
  function fitContent(){ if(!model.items.length){ setZoom(1,vpCenter()); model.camera.x=40; model.camera.y=40; applyCam(); saveSoon(); return; } var gb={l:1e9,t:1e9,r:-1e9,b:-1e9}; model.items.forEach(function(m){ var b=bbox(m); gb.l=Math.min(gb.l,b.l); gb.t=Math.min(gb.t,b.t); gb.r=Math.max(gb.r,b.r); gb.b=Math.max(gb.b,b.b); }); var r=vpRect(); var pad=60; var sw=(gb.r-gb.l)+pad*2, sh=(gb.b-gb.t)+pad*2; var sc=clamp(Math.min(r.width/sw, r.height/sh),0.2,1.5); model.camera.scale=sc; model.camera.x=r.width/2 - ((gb.l+gb.r)/2)*sc; model.camera.y=r.height/2 - ((gb.t+gb.b)/2)*sc; applyCam(); saveSoon(); }

  /* ---- init ---- */
  setTool('select');
  rerender();
  if(model.items.length && (model.camera.x===0&&model.camera.y===0&&model.camera.scale===1)) fitContent();
  else applyCam();

  return {
    destroy:function(){ doc.removeEventListener('keydown',onKey,true); doc.removeEventListener('keyup',onKeyUp,true); doc.removeEventListener('paste',onPasteBoard); saveNow(); },
    rerender:rerender,
    _state:state, _model:model, _api:{ screenToSurface:screenToSurface, addItem:addItem, byId:byId, computeSnap:computeSnap, bbox:bbox, setZoom:setZoom, fitContent:fitContent, model:model, removeItem:removeItem, selectOnly:selectOnly }
  };
}
W.boardEngine={create:create, SURFACE_W:SURFACE_W, SURFACE_H:SURFACE_H};
})();
